<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>

<div class="gallery">
    <img src="https://picsum.photos/id/1015/300/200" onclick="openLightbox(0)">
    <img src="https://picsum.photos/id/1016/300/200" onclick="openLightbox(1)">
    <img src="https://picsum.photos/id/1018/300/200" onclick="openLightbox(2)">
    <img src="https://picsum.photos/id/1020/300/200" onclick="openLightbox(3)">
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <img id="lightbox-img">
    <div class="controls">
        <button onclick="prevImage()">Prev</button>
        <button onclick="nextImage()">Next</button>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
